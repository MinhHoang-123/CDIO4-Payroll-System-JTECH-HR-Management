<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký</title>
  <style>
    body {
      font-family: Arial;
      background-color: #f0f0f0;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    .register-box {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .register-box h2 {
      margin-bottom: 20px;
    }

    .register-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    .register-box button {
      width: 100%;
      padding: 10px;
      background: #27ae60;
      color: white;
      border: none;
    }

    .register-box a {
      display: block;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="register-box">
    <h2>Đăng ký</h2>
    <form action="login.html">
      <input type="text" placeholder="Tên đăng nhập" required>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Mật khẩu" required>
      <button type="submit">Tạo tài khoản</button>
      <a href="login.html">Đã có tài khoản? Đăng nhập</a>
    </form>
  </div>
</body>
</html>
